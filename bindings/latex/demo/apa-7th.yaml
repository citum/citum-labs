info:
  title: American Psychological Association 7th edition
  fields:
  - anthropology
  - communications
  - law
  - medicine
  - psychology
  - social-science
  source:
    csl-id: http://www.zotero.org/styles/apa
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Brenton M. Wiernik
      email: zotero@wiernik.org
      uri: https://orcid.org/0000-0001-9560-6336
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/apa
      rel: self
    - href: http://www.zotero.org/styles/apa-6th-edition
      rel: template
    - href: https://apastyle.apa.org/style-grammar-guidelines/references
      rel: documentation
  short-name: "APA"
  edition: "7th"
options:
  processing: author-date
  substitute:
    template:
      - editor
      - title
      - translator
    role-substitute:
      container-author:
        - editor
        - editorial-director
  contributors:
    name-form: initials
    initialize-with: ". "
    role: short-suffix
    demote-non-dropping-particle: never
    delimiter-precedes-last: always
    and: symbol
    shorten:
      min: 21
      use-first: 19
      use-last: 1
  dates: long
  titles:
    component:
      text-case: as-is
    monograph:
      text-case: as-is
      emph: true
    container-monograph:
      text-case: as-is
      emph: true
    periodical:
      emph: true
    serial:
      text-case: as-is
  multilingual:
    title-mode: combined
    name-mode: primary
    preferred-script: Latn
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten: {min: 3, use-first: 1}
  sort: author-date-title
  non-integral:
    wrap:
      punctuation: parentheses
    type-variants:
      ? legal-case, treaty, hearing
      : - title: primary
          form: short
          emph: true
          quote: false
        - date: issued
          form: year
        - variable: locator
      personal-communication:
      - contributor: author
        form: long
        name-order: given-first
      - term: personal-communication
      - date: issued
        form: full
      - variable: locator
    template:
    - contributor: author
      form: short
    - date: issued
      form: year
    - variable: locator
  delimiter: ", "
  multi-cite-delimiter: "; "
  integral:
    delimiter: " "
    options:
      contributors:
        and: text
    type-variants:
      ? legal-case, treaty, hearing
      : - title: primary
          form: short
          emph: true
          quote: false
        - delimiter: ", "
          wrap:
            punctuation: parentheses
          group:
          - date: issued
            form: year
          - variable: locator
      personal-communication:
      - contributor: author
        form: long
        name-order: given-first
      - delimiter: ", "
        wrap:
          punctuation: parentheses
        group:
        - term: personal-communication
        - date: issued
          form: full
        - variable: locator
    template:
    - contributor: author
      form: short
    - delimiter: ", "
      wrap:
        punctuation: parentheses
      group:
      - date: issued
        form: year
      - variable: locator
bibliography:
